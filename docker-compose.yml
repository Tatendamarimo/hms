name: hms

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hms
      POSTGRES_USER: hms
      POSTGRES_PASSWORD: hms
    ports:
      - "5435:5432" # offset host port: 5432–5434 are used by other local projects
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms -d hms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment: &backend_env
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: dev-only-compose-key
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgres://hms:hms@db:5432/hms
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_roles &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    environment: *backend_env
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
