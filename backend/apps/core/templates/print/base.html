<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Document{% endblock %} — {{ clinic.name }}</title>
  <style>
    body { font-family: Georgia, "Times New Roman", serif; color: #111;
           max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    header.clinic { border-bottom: 2px solid #111; padding-bottom: .75rem;
                    margin-bottom: 1.5rem; }
    header.clinic h1 { margin: 0; font-size: 1.4rem; }
    header.clinic p { margin: .15rem 0; font-size: .9rem; }
    h2.doc-title { font-size: 1.15rem; text-transform: uppercase;
                   letter-spacing: .05em; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: .4rem .5rem; border-bottom: 1px solid #ccc;
             font-size: .95rem; }
    .meta { font-size: .9rem; }
    .sign { margin-top: 3rem; font-size: .95rem; }
    footer { margin-top: 3rem; font-size: .75rem; color: #555;
             border-top: 1px solid #ccc; padding-top: .5rem; }
    .no-print { margin: 1rem 0; }
    @media print { .no-print { display: none; } body { margin: 0; } }
  </style>
</head>
<body>
  <header class="clinic">
    <h1>{{ clinic.name }}</h1>
    {% if clinic.address %}<p>{{ clinic.address }}</p>{% endif %}
    {% if clinic.phone %}<p>Tel: {{ clinic.phone }}</p>{% endif %}
  </header>

  <div class="no-print"><button onclick="window.print()">Print</button></div>

  {% block content %}{% endblock %}

  <footer>
    Printed by {{ request.user }} on {% now "Y-m-d H:i" %} — {{ clinic.name }} HMS
  </footer>
</body>
</html>
