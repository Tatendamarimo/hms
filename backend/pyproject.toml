[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "DJ", "S"]
ignore = [
    "S101",  # asserts are fine in tests; enforced per-file below anyway
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S105", "S106"]  # hardcoded test passwords are fine in tests
"conftest.py" = ["S105", "S106"]
"config/settings/*" = ["F403", "F405"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
addopts = "-q"
